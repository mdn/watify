name: build

permissions:
  contents: write

on:
  release:
    types: [created]

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@9a1d20035bdbcbc899baabe1e402e85bc33639bc # 1.90

      - name: Install wasm-pack
        run: |
          VERSION=$(cargo metadata --manifest-path tools/Cargo.toml --format-version 1 --no-deps \
            | jq -r '.packages[0].dependencies[] | select(.name=="wasm-pack") | .req' \
            | sed 's/^=//')
          cargo install wasm-pack --version "$VERSION" --locked

      - run: wasm-pack build --release --target web
