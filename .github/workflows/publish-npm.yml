name: publish-npm

on:
  workflow_run:
    workflows: [build]
    types: [completed]

permissions:
  id-token: write # OIDC for npm Trusted Publishing

jobs:
  on-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup rust
        uses: dtolnay/rust-toolchain@9a1d20035bdbcbc899baabe1e402e85bc33639bc # 1.90

      - name: Install wasm-pack
        run: |
          VERSION=$(cargo metadata --manifest-path tools/Cargo.toml --format-version 1 --no-deps \
            | jq -r '.packages[0].dependencies[] | select(.name=="wasm-pack") | .req' \
            | sed 's/^=//')
          cargo install wasm-pack --version "$VERSION" --locked

      - name: Build
        run: wasm-pack build --release --target web --scope mdn

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org/"
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Publish
        working-directory: ./pkg
        run: npm publish --access public --provenance
